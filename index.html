<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Vihaan Shringi — Links" />
  <title>Vihaan Shringi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.15);
      --text: #ebebeb;
      --muted: #666;
      --accent: #38bdf8;
      --accent-glow: rgba(56,189,248,0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 80px;
      overflow-x: hidden;
      position: relative;
    }

    /* Subtle dot grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 36px 36px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow */
    .ambient {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56,189,248,0.04) 0%, transparent 65%);
      top: -180px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Noise grain */
    .noise {
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* --- Profile --- */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
    }

    .avatar-wrap {
      position: relative;
      width: 88px;
      height: 88px;
    }

    .avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), rgba(99,102,241,0.6));
      z-index: 0;
      animation: rotate 6s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .avatar-wrap::after {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: 50%;
      background: var(--bg);
      z-index: 1;
    }

    .avatar {
      position: relative;
      z-index: 2;
      width: 84px;
      height: 84px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      display: block;
      margin: 2px;
    }

    .profile-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .profile-handle {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    .profile-bio {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      max-width: 320px;
    }

    .profile-bio strong {
      color: var(--text);
      font-weight: 500;
    }

    /* --- Links --- */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.18s ease, box-shadow 0.2s ease;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.02) 100%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .link-card:hover {
      border-color: var(--border-hover);
      background: var(--surface2);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }

    .link-card:hover::before { opacity: 1; }

    .link-card:active {
      transform: translateY(0px);
      box-shadow: none;
    }

    .link-card.accent {
      border-color: rgba(56,189,248,0.2);
      background: rgba(56,189,248,0.04);
    }

    .link-card.accent:hover {
      border-color: rgba(56,189,248,0.4);
      background: rgba(56,189,248,0.08);
      box-shadow: 0 8px 32px rgba(56,189,248,0.1);
    }

    .link-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      transition: background 0.2s;
    }

    .link-card.accent .link-icon {
      background: rgba(56,189,248,0.1);
      border-color: rgba(56,189,248,0.2);
    }

    .link-card:hover .link-icon {
      background: rgba(255,255,255,0.06);
    }

    .link-icon svg {
      width: 20px;
      height: 20px;
    }

    .link-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .link-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .link-sub {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
    }

    .link-arrow {
      color: var(--muted);
      transition: color 0.2s, transform 0.2s;
      flex-shrink: 0;
    }

    .link-card:hover .link-arrow {
      color: var(--text);
      transform: translateX(3px);
    }

    /* --- Divider --- */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 8px 0;
    }

    /* --- Section label --- */
    .section-label {
      width: 100%;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
      padding-left: 2px;
    }

    /* --- Footer --- */
    .footer {
      position: relative;
      z-index: 1;
      margin-top: 52px;
      text-align: center;
    }

    .footer-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-bottom: 10px;
      animation: pulse 2.5s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .footer p {
      font-size: 12px;
      color: var(--muted);
    }

    /* --- Stagger animation --- */
    .fade-up {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.5s ease forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-up:nth-child(1) { animation-delay: 0.05s; }
    .fade-up:nth-child(2) { animation-delay: 0.1s; }
    .fade-up:nth-child(3) { animation-delay: 0.15s; }
    .fade-up:nth-child(4) { animation-delay: 0.2s; }
    .fade-up:nth-child(5) { animation-delay: 0.25s; }
    .fade-up:nth-child(6) { animation-delay: 0.3s; }
    .fade-up:nth-child(7) { animation-delay: 0.35s; }
    .fade-up:nth-child(8) { animation-delay: 0.4s; }

    /* --- Mobile tweaks --- */
    @media (max-width: 480px) {
      body { padding: 40px 16px 72px; }
      .profile-name { font-size: 24px; }
      .link-card { padding: 14px 16px; }
      .link-label { font-size: 14px; }
    }
  </style>
</head>
