<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Vihaan Shringi" />
  <title>Vihaan Shringi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }


    /* ── Page wrapper ── */
    .page {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 20px 72px;
    }

    /* ── Avatar ── */
    .avatar-wrap img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* ── Profile text ── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      margin-bottom: 28px;
      text-align: center;
    }

    .profile-name {
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #fff;
    }

    .profile-bio {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
      max-width: 310px;
    }

    /* ── Links ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 15px;
      background: #0d0d0d;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      text-decoration: none;
      color: #fff;
      transition: background 0.15s ease, border-color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .card:hover {
      background: #141414;
      border-color: #2a2a2a;
    }

    .card:active {
      background: #111;
    }

    .icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: #1a1a1a;
      border: 1px solid #252525;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon svg {
      width: 16px;
      height: 16px;
    }

    .card-text {
      flex: 1;
    }

    .card-label {
      font-size: 14px;
      font-weight: 500;
      color: #f0f0f0;
      display: block;
    }

    .card-sub {
      font-size: 11px;
      color: #444;
      display: block;
      margin-top: 1px;
    }

    .chevron {
      color: #333;
      flex-shrink: 0;
      transition: color 0.15s, transform 0.15s;
    }

    .card:hover .chevron {
      color: #666;
      transform: translateX(2px);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 40px;
      font-size: 11px;
      color: #2a2a2a;
    }
  </style>
</head>
