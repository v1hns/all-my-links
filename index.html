<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Vihaan Shringi — Links" />
  <title>Vihaan Shringi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #030510;
      --surface: rgba(0,229,255,0.025);
      --surface-hover: rgba(0,229,255,0.055);
      --border: rgba(0,229,255,0.12);
      --border-hover: rgba(0,229,255,0.5);
      --text: #dff4fa;
      --muted: rgba(0,229,255,0.38);
      --cyan: #00e5ff;
      --magenta: #ff2d78;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px 80px;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Canvas background ── */
    #bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Vignette ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 40%, rgba(3,5,16,0.75) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* ── Scanlines overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 2;
    }

    /* ── Main container ── */
    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Status bar ── */
    .status-bar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0 36px;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--muted);
      opacity: 0;
      animation: fadeIn 0.4s ease 0.1s forwards;
    }

    .status-bar .dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: var(--cyan);
      border-radius: 50%;
      margin-right: 6px;
      animation: blink 1.8s ease infinite;
      box-shadow: 0 0 6px var(--cyan);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* ── Profile ── */
    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.2s forwards;
    }

    /* Hex avatar */
    .avatar-outer {
      position: relative;
      width: 110px;
      height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-outer::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: conic-gradient(var(--cyan), transparent 60%, var(--magenta), transparent 80%, var(--cyan));
      animation: spinRing 4s linear infinite;
    }

    .avatar-outer::after {
      content: '';
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      background: var(--bg);
    }

    @keyframes spinRing {
      to { transform: rotate(360deg); }
    }

    .avatar-inner {
      position: relative;
      z-index: 2;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      overflow: hidden;
      border: 1px solid rgba(0,229,255,0.25);
      box-shadow:
        0 0 20px rgba(0,229,255,0.15),
        inset 0 0 20px rgba(0,229,255,0.05);
    }

    .avatar-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* Scanline on avatar */
    .avatar-inner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(0,229,255,0.06) 50%,
        transparent 100%
      );
      background-size: 100% 40px;
      animation: scan 3s linear infinite;
    }

    @keyframes scan {
      0%   { background-position: 0 -40px; }
      100% { background-position: 0 140px; }
    }

    /* HUD tick marks around avatar */
    .avatar-ticks {
      position: absolute;
      inset: -8px;
      z-index: 3;
      pointer-events: none;
    }

    .tick {
      position: absolute;
      background: var(--cyan);
      opacity: 0.7;
    }

    .tick.t  { top: 0;    left: 50%; transform: translateX(-50%); width: 1px; height: 8px; }
    .tick.b  { bottom: 0; left: 50%; transform: translateX(-50%); width: 1px; height: 8px; }
    .tick.l  { left: 0;   top: 50%;  transform: translateY(-50%); height: 1px; width: 8px; }
    .tick.r  { right: 0;  top: 50%;  transform: translateY(-50%); height: 1px; width: 8px; }

    /* Glitch name */
    .profile-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
      position: relative;
      animation: glitch 6s ease infinite;
    }

    .profile-name::before,
    .profile-name::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      opacity: 0;
    }

    @keyframes glitch {
      0%, 88%, 100% {
        text-shadow: none;
        transform: none;
      }
      89% {
        text-shadow: -2px 0 var(--magenta), 2px 0 var(--cyan);
        transform: translate(-1px, 0);
      }
      91% {
        text-shadow: 2px 0 var(--magenta), -2px 0 var(--cyan);
        transform: translate(1px, 0);
      }
      92% {
        text-shadow: none;
        transform: none;
      }
      94% {
        text-shadow: -1px 0 var(--cyan);
        transform: translate(0.5px, 0);
      }
      95% {
        text-shadow: none;
        transform: none;
      }
    }

    .profile-handle {
      font-size: 12px;
      color: var(--cyan);
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .cursor-blink {
      display: inline-block;
      width: 7px;
      height: 13px;
      background: var(--cyan);
      margin-left: 1px;
      animation: cursorBlink 1.1s step-end infinite;
      vertical-align: middle;
      opacity: 0.85;
    }

    @keyframes cursorBlink {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 0; }
    }

    .profile-bio {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
      letter-spacing: 0.03em;
    }

    .profile-bio .hi { color: rgba(0,229,255,0.7); }

    /* ── Links ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      text-decoration: none;
      color: var(--text);
      transition:
        border-color 0.22s ease,
        background 0.22s ease,
        transform 0.18s ease,
        box-shadow 0.22s ease;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    /* Corner bracket: TL */
    .link-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 6px;
      background:
        linear-gradient(var(--cyan), var(--cyan)) top left  / 10px 1px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) top left  / 1px 10px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) bottom right / 10px 1px no-repeat,
        linear-gradient(var(--cyan), var(--cyan)) bottom right / 1px 10px no-repeat;
      opacity: 0.35;
      transition: opacity 0.22s ease;
      pointer-events: none;
    }

    /* Hover sweep */
    .link-card::after {
      content: '';
      position: absolute;
      top: 0; left: -60%;
      width: 45%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.05), transparent);
      transition: none;
      pointer-events: none;
    }

    .link-card:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
      transform: translateY(-2px);
      box-shadow:
        0 0 20px rgba(0,229,255,0.08),
        0 8px 30px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(0,229,255,0.08);
    }

    .link-card:hover::before { opacity: 1; }

    .link-card:hover::after {
      animation: cardSweep 0.55s ease forwards;
    }

    @keyframes cardSweep {
      from { left: -60%; }
      to   { left: 120%; }
    }

    .link-card:active { transform: translateY(0); box-shadow: none; }

    /* Accent card (personal site) */
    .link-card.accent {
      border-color: rgba(0,229,255,0.22);
      background: rgba(0,229,255,0.04);
    }

    .link-card.accent:hover {
      border-color: var(--cyan);
      box-shadow:
        0 0 30px rgba(0,229,255,0.14),
        0 8px 30px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(0,229,255,0.12);
    }

    /* Animation delays */
    .link-card:nth-child(1) { animation-delay: 0.35s; }
    .link-card:nth-child(2) { animation-delay: 0.42s; }
    .link-card:nth-child(3) { animation-delay: 0.49s; }
    .link-card:nth-child(4) { animation-delay: 0.56s; }
    .link-card:nth-child(5) { animation-delay: 0.63s; }

    /* Icon box */
    .link-icon {
      width: 38px;
      height: 38px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: rgba(0,229,255,0.04);
      border: 1px solid rgba(0,229,255,0.15);
      transition: border-color 0.2s, background 0.2s;
    }

    .link-card:hover .link-icon {
      background: rgba(0,229,255,0.08);
      border-color: rgba(0,229,255,0.35);
    }

    .link-icon svg { width: 18px; height: 18px; }

    /* Text */
    .link-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .link-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .link-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* Arrow */
    .link-arrow {
      color: var(--muted);
      transition: color 0.2s, transform 0.2s;
      flex-shrink: 0;
      opacity: 0.5;
    }

    .link-card:hover .link-arrow {
      color: var(--cyan);
      transform: translateX(4px);
      opacity: 1;
    }

    /* ── Footer ── */
    .footer {
      position: relative;
      z-index: 10;
      margin-top: 48px;
      text-align: center;
      opacity: 0;
      animation: fadeIn 0.5s ease 0.9s forwards;
    }

    .footer-line {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      margin: 0 auto 14px;
    }

    .footer p {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* ── Keyframes ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      body { padding: 0 14px 72px; }
      .profile-name { font-size: 24px; }
      .link-card { padding: 14px 14px; }
      .link-label { font-size: 13px; }
    }
  </style>

  <script>
    // ── Perspective grid + particles ──────────────────────────────────────
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Particles
    const PARTICLE_COUNT = 55;
    const particles = Array.from({ length: PARTICLE_COUNT }, () => ({
      x: Math.random() * 1,
      y: Math.random() * 1,
      r: Math.random() * 1.2 + 0.3,
      vx: (Math.random() - 0.5) * 0.00008,
      vy: (Math.random() - 0.5) * 0.00008,
      a: Math.random() * 0.4 + 0.1,
    }));

    let offset = 0;

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // ── Perspective grid ──
      const horizon = H * 0.28;
      const vpx     = W * 0.5;

      // Vertical lines
      const vLines = 14;
      for (let i = 0; i <= vLines; i++) {
        const bx = (W / vLines) * i;
        const dist = Math.abs(i / vLines - 0.5) * 2;
        const a = 0.025 + dist * 0.015;
        ctx.strokeStyle = `rgba(0,229,255,${a})`;
        ctx.lineWidth   = 0.5;
        ctx.beginPath();
        ctx.moveTo(vpx, horizon);
        ctx.lineTo(bx, H);
        ctx.stroke();
      }

      // Horizontal lines (scrolling)
      const hLines = 12;
      for (let i = 0; i < hLines; i++) {
        const t  = ((i / hLines) + (offset % 1)) % 1;
        const y  = horizon + (H - horizon) * (t * t);
        const pct = (y - horizon) / (H - horizon);
        const hw = (W * 0.55) * pct;
        const a  = 0.018 + pct * 0.055;
        ctx.strokeStyle = `rgba(0,229,255,${a})`;
        ctx.lineWidth   = 0.5;
        ctx.beginPath();
        ctx.moveTo(vpx - hw, y);
        ctx.lineTo(vpx + hw, y);
        ctx.stroke();
      }

      // Horizon glow line
      ctx.strokeStyle = 'rgba(0,229,255,0.06)';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(0, horizon);
      ctx.lineTo(W, horizon);
      ctx.stroke();

      // ── Particles ──
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0) p.x = 1;
        if (p.x > 1) p.x = 0;
        if (p.y < 0) p.y = 1;
        if (p.y > 1) p.y = 0;

        const px = p.x * W;
        const py = p.y * H;

        ctx.beginPath();
        ctx.arc(px, py, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,229,255,${p.a})`;
        ctx.fill();
      }

      // Draw connections between close particles
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx   = (particles[i].x - particles[j].x) * W;
          const dy   = (particles[i].y - particles[j].y) * H;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 90) {
            const a = (1 - dist / 90) * 0.06;
            ctx.strokeStyle = `rgba(0,229,255,${a})`;
            ctx.lineWidth   = 0.4;
            ctx.beginPath();
            ctx.moveTo(particles[i].x * W, particles[i].y * H);
            ctx.lineTo(particles[j].x * W, particles[j].y * H);
            ctx.stroke();
          }
        }
      }

      offset += 0.0025;
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
